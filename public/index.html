<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Consultant - Automação & IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --chat-bg: #1e293b;
            --user-bubble: #3b82f6;
            --ai-bubble: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: #334155;
            --accent: #60a5fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #chat-container {
            width: 100%;
            max-width: 600px;
            height: 80vh;
            background-color: var(--chat-bg);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            margin: 20px;
        }

        header {
            padding: 20px;
            background-color: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header .status {
            width: 10px;
            height: 10px;
            background-color: #22c55e;
            border-radius: 50%;
        }

        header h1 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.ai {
            align-self: flex-start;
            background-color: var(--ai-bubble);
            border-bottom-left-radius: 2px;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--user-bubble);
            border-bottom-right-radius: 2px;
        }

        .typing {
            font-style: italic;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        #input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            background-color: #1e293b;
            border-top: 1px solid #334155;
        }

        input {
            flex: 1;
            background-color: var(--input-bg);
            border: 1px solid #475569;
            border-radius: 8px;
            padding: 12px 16px;
            color: white;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            background-color: var(--user-bubble);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 20px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }

        /* Custom Scrollbar */
        #messages::-webkit-scrollbar {
            width: 6px;
        }
        #messages::-webkit-scrollbar-track {
            background: transparent;
        }
        #messages::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <header>
            <div class="status"></div>
            <h1>AI Consultant - Eliezer Perez</h1>
        </header>
        
        <div id="messages"></div>
        
        <div id="typing-indicator" class="typing" style="display: none; padding-left: 20px;">O consultor está a escrever...</div>

        <form id="input-area">
            <input type="text" id="user-input" placeholder="Escreve a tua mensagem..." autocomplete="off">
            <button type="submit" id="send-btn">Enviar</button>
        </form>
    </div>

    <script>
        const chatBox = document.getElementById('messages');
        const chatForm = document.getElementById('input-area');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        let conversation = [];
        let leadDataSent = false;

        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = content;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function handleSubmit(e) {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            conversation.push({ role: 'user', content: text });
            userInput.value = '';
            
            setLoading(true);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ conversation })
                });

                const data = await response.json();
                
                if (data.error) throw new Error(data.error);

                addMessage('ai', data.reply);
                conversation.push({ role: 'assistant', content: data.reply });

                // Se o lead estiver pronto e ainda não foi enviado
                if (data.leadReady && !leadDataSent) {
                    await sendLeadToWebhook(data.leadData);
                }

            } catch (err) {
                console.error(err);
                addMessage('ai', "Peço desculpa, ocorreu um erro na ligação. Podes tentar novamente?");
            } finally {
                setLoading(false);
            }
        }

        async function sendLeadToWebhook(leadData) {
            try {
                leadDataSent = true;
                const response = await fetch('/api/send-lead', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(leadData)
                });
                const result = await response.json();
                if (result.success) {
                    console.log("Lead sincronizado com n8n com sucesso.");
                }
            } catch (err) {
                console.error("Erro ao enviar lead:", err);
                leadDataSent = false; // Permite re-tentar se falhar
            }
        }

        function setLoading(isLoading) {
            userInput.disabled = isLoading;
            sendBtn.disabled = isLoading;
            typingIndicator.style.display = isLoading ? 'block' : 'none';
        }

        window.onload = () => {
            const initialMsg = "Olá — sou o AI consultant de automação. O que gostarias de melhorar no teu negócio neste momento?";
            addMessage('ai', initialMsg);
            // Non-official, but helps tracking if we want
            // conversation.push({ role: 'assistant', content: initialMsg });
        };

        chatForm.addEventListener('submit', handleSubmit);
    </script>
</body>
</html>
